services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "5004:5004"
    volumes:
      - data:/data
    depends_on:
      - mailbox

  mailbox:
    build:
      context: .
      dockerfile: Dockerfile.mailbox
    ports:
      - "5014:5014"
    volumes:
      - maildata:/data

volumes:
  data:
  maildata:
