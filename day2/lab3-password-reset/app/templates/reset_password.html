<!DOCTYPE html>
<html>
<head><title>Reset Password</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="nav"><span class="brand">Account Portal</span></div>
<div class="container">
  <div class="card text-center">
    <h1>Reset Password</h1>
    {% if success %}
    <div class="flash flash-success">Password has been reset successfully!</div>
    <p><a href="/login">Sign in with your new password</a></p>
    {% else %}
    {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
    <p>Enter your new password below.</p>
    <form method="POST">
      <input type="hidden" name="token" value="{{ token }}">
      <label>Username</label>
      <input type="text" name="username" value="{{ username }}">
      <label>New Password</label>
      <input type="password" name="new_password" required>
      <button type="submit">Reset Password</button>
    </form>
    {% endif %}
  </div>
</div>
</body>
</html>
