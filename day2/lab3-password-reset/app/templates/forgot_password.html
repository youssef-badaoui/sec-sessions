<!DOCTYPE html>
<html>
<head><title>Forgot Password</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="nav"><span class="brand">Account Portal</span></div>
<div class="container">
  <div class="card text-center">
    <h1>Forgot Password</h1>
    {% if success %}
    <div class="flash flash-success">If the account exists, a reset link has been sent to the associated mailbox.</div>
    <p><a href="/login">Back to Login</a></p>
    {% else %}
    <p>Enter your username and we'll send a reset link to your mailbox.</p>
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" required>
      <button type="submit">Send Reset Link</button>
    </form>
    <p class="mt-16"><a href="/login">Back to Login</a></p>
    {% endif %}
  </div>
</div>
</body>
</html>
