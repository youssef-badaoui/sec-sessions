services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "5003:5003"
    volumes:
      - data:/data
    depends_on:
      - mailbox

  mailbox:
    build:
      context: .
      dockerfile: Dockerfile.mailbox
    ports:
      - "5013:5013"
    volumes:
      - maildata:/data

volumes:
  data:
  maildata:
