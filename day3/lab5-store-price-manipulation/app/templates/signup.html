<!DOCTYPE html>
<html>
<head>
    <title>TechStore - Sign Up</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="nav">
    <span class="brand">TechStore</span>
</div>
<div class="container">
    <div class="card">
        <h1>Create Account</h1>
        <p>New accounts start with <strong>$200.00</strong> store credit.</p>
        {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
        <form method="post">
            <label>Username</label>
            <input type="text" name="username" required>
            <label>Password</label>
            <input type="password" name="password" required>
            <button type="submit">Create Account</button>
        </form>
        <p class="mt-16">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>
</body>
</html>
