<!DOCTYPE html>
<html>
<head><title>Order Confirmation</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="nav">
  <span class="brand">TechShop</span>
  <a href="/">Products</a>
  <a href="/admin/orders">Orders</a>
</div>
<div class="container">
  <div class="card text-center">
    <h1>Order Confirmed!</h1>
    <div class="flash flash-success">Your order #{{ order_id }} has been placed successfully.</div>
    <table class="table">
      <tr><td>Product</td><td>{{ product.name }}</td></tr>
      <tr><td>Quantity</td><td>{{ quantity }}</td></tr>
      <tr><td>Unit Price</td><td>${{ "%.2f" | format(unit_price) }}</td></tr>
      <tr><td><strong>Total</strong></td><td><strong>${{ "%.2f" | format(total) }}</strong></td></tr>
    </table>
    <p class="mt-16"><a href="/" class="btn">Continue Shopping</a></p>
  </div>
</div>
</body>
</html>
