<!DOCTYPE html>
<html>
<head><title>Link Preview</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="nav"><span class="brand">Link Preview Tool</span></div>
<div class="container">
  <div class="card text-center">
    <h1>URL Preview</h1>
    <p>Enter a URL to fetch and preview its content</p>
    {% if error %}<div class="flash flash-error">Error: {{ error }}</div>{% endif %}
    <form method="POST" action="/preview">
      <label>URL</label>
      <input type="text" name="url" value="{{ url or '' }}" placeholder="https://example.com" required>
      <button type="submit">Fetch Preview</button>
    </form>
  </div>
</div>
</body>
</html>
