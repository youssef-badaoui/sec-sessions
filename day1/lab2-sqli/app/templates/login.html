<!DOCTYPE html>
<html>
<head><title>Employee Portal - Login</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="nav"><span class="brand">Employee Portal</span></div>
<div class="container">
  <div class="card text-center">
    <h1>Employee Portal</h1>
    <p>Sign in to access the company dashboard</p>
    {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
    {% if query %}
    <div class="card sql-debug">
      <div class="sql-label">Executed Query</div>
      <pre>{{ query }}</pre>
    </div>
    {% endif %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" required>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
